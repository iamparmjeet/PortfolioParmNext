name: CI

# Auto-runs on GitHub are intentionally disabled — this workflow only runs when
# manually dispatched (or locally via `act`, see README). To enable CI on
# GitHub later, uncomment the push / pull_request triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  # pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check-types

      - name: Lint + format check
        run: bunx biome check .

      # - name: Test
      #   run: bun run test

      - name: Build
        run: bun run build
