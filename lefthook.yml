# lefthook.yml
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bun biome check --write --no-errors-on-unmatched
        --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true # WHY: typecheck and lint are independent — run both simultaneously
  jobs:
    - name: typecheck
      run: bun run check-types
    - name: biome-full # WHY: mirrors CI exactly — catches repo-wide violations before push
      run: bunx biome check .
